<!-- Starfield Background -->
<div id="starfield"></div>
<div class="nebula-bg"></div>
<div class="nebula-cloud nc-1"></div>
<div class="nebula-cloud nc-2"></div>
<div class="nebula-cloud nc-3"></div>

<app-navbar></app-navbar>

<!-- Hero Section -->
<section id="hero-section" class="hero">
  <div class="hero-background">
    <div class="hero-particles"></div>
  </div>
  <div class="hero-content">
    <div class="hero-text">
      <span class="hero-badge">Nueva Colección 2026</span>
      <h1>La Casa del Perfume</h1>
      <p class="hero-subtitle">Descubre fragancias exclusivas que revelan tu esencia. Perfumes premium creados para dejar una impresión memorable.</p>
      <div class="hero-buttons">
        <a href="#catalogo-section" class="btn-primary" (click)="scrollToCatalog($event)">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
          </svg>
          Ver Catálogo
        </a>
      </div>
    </div>
    <div class="hero-image">
      <div class="hero-image-wrapper">
        <div class="hero-image-frame">
          <img src="https://images.unsplash.com/photo-1523293182086-7651a899d37f?w=600&h=750&fit=crop" alt="Perfume Premium" />
        </div>
        <div class="floating-element fe-1">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
          </svg>
        </div>
        <div class="floating-element fe-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </div>
      </div>
    </div>
  </div>
</section>



<!-- Catálogo de Productos -->
<section id="catalogo-section">
  <app-catalogo></app-catalogo>
</section>

<!-- Botón flotante del carrito -->
<a routerLink="/carrito" (click)="onNavigate()" class="floating-cart">
  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="9" cy="21" r="1"></circle>
    <circle cx="20" cy="21" r="1"></circle>
    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
  </svg>
  @if (carritoService.itemCount() > 0) {
    <span class="badge">{{ carritoService.itemCount() }}</span>
  }
</a>

<app-footer></app-footer>
